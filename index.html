<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dünyanın En İyi Annesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFD6E0;
            --cream: #FFF8F5;
            --rose-gold: #E6A57E;
            --dark-text: #3A3A3A;
            --accent-red: #FF4F81;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: var(--dark-text);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .container {
            position: relative; z-index: 10;
            width: 85%; max-width: 400px;
            background: white; padding: 40px 20px;
            border-radius: 30px; text-align: center;
            box-shadow: 0 15px 35px rgba(230, 165, 126, 0.2);
            border: 1px solid rgba(230, 165, 126, 0.3);
        }

        .heart-icon {
            font-size: 70px; color: var(--accent-red);
            cursor: pointer;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--rose-gold); margin-top: 15px; font-size: 1.8rem; }
        #quote { font-style: italic; margin: 20px 0; min-height: 60px; color: #555; transition: 0.5s; font-size: 1rem; line-height: 1.5; }

        .music-btn {
            background: var(--rose-gold);
            color: white; border: none;
            padding: 15px 30px; border-radius: 30px;
            cursor: pointer; font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem; transition: 0.3s;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(230, 165, 126, 0.4);
        }

        .music-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-icon" id="heart" onclick="toggleMusic()">❤️</div>
        <h1>Canım Annem</h1>
        <div id="quote">"Senin sevgin, dünyamı aydınlatan en güzel ışık."</div>

        <!-- Seçtiğin özel aşk melodisi burada -->
        <audio id="bgMusic" loop>
            <source src="muzik.mp3" type="audio/mpeg">
        </audio>

        <button class="music-btn" onclick="toggleMusic()" id="btnText">Bizim Şarkımızı Başlat 🎵</button>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const heart = document.getElementById('heart');
        const btnText = document.getElementById('btnText');
        const quoteEl = document.getElementById('quote');

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(e => console.log("Müzik yükleniyor..."));
                heart.style.animation = "pulse 0.8s infinite";
                btnText.innerText = "Müziği Durdur ⏸️";
            } else {
                music.pause();
                heart.style.animation = "pulse 2s infinite";
                btnText.innerText = "Devam Et 🎵";
            }
        }

        const quotes = [
            "\"Anne, insanın hayattaki ilk ve en büyük mucizesidir.\"",
            "\"Dünyanın en güvenli limanı, senin kucağındır.\"",
            "\"Cennet, annelerin ayakları altındadır.\"",
            "\"Bazı kahramanların pelerini yoktur, onlara anne denir.\"",
            "\"Senin gülüşün, benim en huzurlu manzaram.\""
        ];
        
        let i = 0;
        setInterval(() => {
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % quotes.length;
                quoteEl.innerText = quotes[i];
                quoteEl.style.opacity = 1;
            }, 500);
        }, 5000);
    </script>
</body>
</html>
